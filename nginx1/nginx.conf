events {}

http {

    upstream backend {
        server nginx2:80;
        server nginx3:80;
    }

    server {
        listen 80;

        location / {

            # Уничтожаем поддельный XFF клиента
            proxy_set_header X-Forwarded-For $remote_addr;

            proxy_set_header Host $host;

            proxy_pass http://backend;
        }
    }
}

